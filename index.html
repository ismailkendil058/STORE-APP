<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>STORE APP</title>
  <meta name="description" content="STORE APP - Premium Store" />
  <meta name="author" content="STORE APP" />

  <link rel="icon" type="image/jpeg" href="/store-icon.jpg" />
  <link rel="apple-touch-icon" href="/store-icon.jpg">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script>
    (function () {
      const isAdminPath = window.location.pathname.startsWith('/admin');
      const manifestPath = isAdminPath ? '/sa-admin.json' : '/sa-worker.json';
      const appTitle = isAdminPath ? 'SA admin' : 'SA worker';

      // Create and inject manifest link
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.id = 'dynamic-manifest';
      link.href = manifestPath;
      document.head.appendChild(link);

      // Set Apple-specific meta title
      const appleMeta = document.createElement('meta');
      appleMeta.name = 'apple-mobile-web-app-title';
      appleMeta.content = appTitle;
      document.head.appendChild(appleMeta);

      // Set application-name meta
      const appMeta = document.createElement('meta');
      appMeta.name = 'application-name';
      appMeta.content = appTitle;
      document.head.appendChild(appMeta);

      // Set initial page title
      document.title = appTitle;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <meta property="og:title" content="STORE APP" />
  <meta property="og:description" content="STORE APP - Premium Store" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/store-icon.jpg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@STOREAPP" />
  <meta name="twitter:image" content="/store-icon.jpg" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
